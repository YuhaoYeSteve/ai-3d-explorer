<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 3D 探索</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container"></div>
  <div id="fade-overlay"></div>
  <div id="chat-box">
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <input id="chat-input" type="text" placeholder="输入环境描述，如：赛博朋克城市">
      <button id="chat-send">发送</button>
    </div>
  </div>
  <div id="preview-overlay"></div>
  <div id="preview-popup">
    <div id="preview-header">
      <span>图片预览</span>
      <button id="preview-close-btn">&times;</button>
    </div>
    <div id="preview-body">
      <img id="preview-image" src="" alt="预览图片">
    </div>
    <div id="preview-footer">
      <button id="preview-apply-btn">应用为天空盒</button>
      <button id="preview-cancel-btn">关闭</button>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
